name: Update Login Flag

on:
  repository_dispatch:
    types: [admin-login]

jobs:
  update-login-flag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Update login flag file
        run: |
          echo "Admin logged in at $(date)" > loginFlag.txt
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add loginFlag.txt
          git commit -m "Update login flag: admin logged in at $(date)"
      
      - name: Push changes
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.MY_GITHUB_TOKEN }}
